<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>AR Photo Frame</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      z-index: 1;
    }

    video {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas,
    .a-canvas {
      background: transparent !important;
    }

    .mindar-ui-scanning.hidden,
    .mindar-ui-loading.hidden,
    .mindar-ui-overlay.hidden,
    body.marker-found .mindar-ui-scanning,
    body.marker-found .mindar-ui-loading,
    body.marker-found .mindar-ui-overlay {
      display: none !important;
    }

    .tracking-status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>

<body>

<script>
AFRAME.registerComponent('billboard-y', {
  init: function () {
    this.camera = null
    this.camPos = new THREE.Vector3()
    this.objPos = new THREE.Vector3()
    this.target = new THREE.Object3D()
    this.targetWorldQuat = new THREE.Quaternion()
    this.parentWorldQuat = new THREE.Quaternion()
    this.targetLocalQuat = new THREE.Quaternion()
  },

  tick: function () {
    if (!this.camera) {
      this.camera = document.querySelector('[camera]')
    }

    if (!this.camera) return

    this.camera.object3D.getWorldPosition(this.camPos)

    const obj = this.el.object3D
    obj.getWorldPosition(this.objPos)

    this.target.position.copy(this.objPos)
    this.target.lookAt(
      this.camPos.x,
      this.objPos.y,
      this.camPos.z
    )

    this.targetWorldQuat.copy(this.target.quaternion)

    if (obj.parent) {
      obj.parent.getWorldQuaternion(this.parentWorldQuat).invert()
      this.targetLocalQuat.copy(this.parentWorldQuat).multiply(this.targetWorldQuat)
    } else {
      this.targetLocalQuat.copy(this.targetWorldQuat)
    }

    obj.quaternion.slerp(this.targetLocalQuat, 0.12)
  }
})

AFRAME.registerComponent('smooth-world-anchor', {
  init: function () {
    this.worldAnchor = document.querySelector('#worldAnchor')
    this.pos = new THREE.Vector3()
    this.quat = new THREE.Quaternion()
    this.scale = new THREE.Vector3()
    this.localPos = new THREE.Vector3()
    this.localQuat = new THREE.Quaternion()
    this.parentQuat = new THREE.Quaternion()
    this.hasPose = false
    this.tracking = false

    if (this.worldAnchor) {
      this.worldAnchor.setAttribute('visible', 'false')
    }

    this.el.addEventListener('targetFound', () => {
      console.log('TARGET FOUND')

      this.tracking = true

      if (this.worldAnchor) {
        this.worldAnchor.setAttribute('visible', 'true')
      }

      document
        .querySelectorAll('.mindar-ui-scanning, .mindar-ui-loading, .mindar-ui-overlay')
        .forEach((el) => el.classList.add('hidden'))
      document.body.classList.add('marker-found')
    })

    this.el.addEventListener('targetLost', () => {
      this.tracking = false
    })
  },

  tick: function () {
    if (!this.tracking || !this.worldAnchor) return

    this.el.object3D.getWorldPosition(this.pos)
    this.el.object3D.getWorldQuaternion(this.quat)
    this.el.object3D.getWorldScale(this.scale)

    const parent = this.worldAnchor.object3D.parent

    this.localPos.copy(this.pos)

    if (parent) {
      parent.worldToLocal(this.localPos)
      parent.getWorldQuaternion(this.parentQuat).invert()
      this.localQuat.copy(this.parentQuat).multiply(this.quat)
    } else {
      this.localQuat.copy(this.quat)
    }

    if (!this.hasPose) {
      this.worldAnchor.object3D.position.copy(this.localPos)
      this.worldAnchor.object3D.quaternion.copy(this.localQuat)
      this.worldAnchor.object3D.scale.copy(this.scale)
      this.hasPose = true
      return
    }

    this.worldAnchor.object3D.position.lerp(this.localPos, 0.12)
    this.worldAnchor.object3D.quaternion.slerp(this.localQuat, 0.12)
    this.worldAnchor.object3D.scale.lerp(this.scale, 0.12)
  }
})

</script>

<a-scene
  mindar-image="
    imageTargetSrc: ./target.mind;
    filterMinCF: 0.01;
    filterBeta: 0.1;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <a-assets>
    <img id="char" src="./character.png" />
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  >
  </a-camera>

  <!-- TRACKER -->
  <a-entity
    id="marker"
    mindar-image-target="targetIndex: 0"
    smooth-world-anchor>
  </a-entity>

  <a-entity id="worldAnchor" visible="false">
    <a-box
      position="0 0 0.08"
      width="0.2"
      height="0.2"
      depth="0.2"
      color="red">
    </a-box>

    <a-plane
      id="character"
      position="0 0 0.12"
      width="0.8"
      height="1.13"
      material="
        shader: flat;
        src: #char;
        transparent: true;
        alphaTest: 0.01;
        opacity: 1;
        depthWrite: false;
        side: double;
      "
      billboard-y>
    </a-plane>
  </a-entity>

</a-scene>

</body>
</html>
