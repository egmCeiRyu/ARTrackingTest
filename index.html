<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>AR Photo Frame</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      z-index: 1;
    }

    video {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas,
    .a-canvas {
      background: transparent !important;
    }

    .tracking-status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>

<body>

<script>
AFRAME.registerComponent('target-state', {
  init: function () {
    const status = document.querySelector('[data-tracking-status]')

    this.el.sceneEl.addEventListener('arReady', () => {
      if (status) status.textContent = 'Aponte a camera para o marcador'
    })

    this.el.sceneEl.addEventListener('arError', () => {
      if (status) status.textContent = 'Nao foi possivel abrir a camera'
    })

    this.el.addEventListener('targetFound', () => {
      if (status) status.textContent = 'Alvo detectado'
    })

    this.el.addEventListener('targetLost', () => {
      if (status) status.textContent = 'Aponte a camera para o marcador'
    })
  }
})

AFRAME.registerComponent('billboard-y', {
  init: function () {
    this.camera = null
    this.camPos = new THREE.Vector3()
    this.objPos = new THREE.Vector3()
    this.targetY = 0
  },

  tick: function () {
    if (!this.camera) {
      this.camera = document.querySelector('[camera]')
    }

    if (!this.camera) return

    const obj = this.el.object3D

    this.camera.object3D.getWorldPosition(this.camPos)
    obj.getWorldPosition(this.objPos)

    this.targetY = Math.atan2(
      this.camPos.x - this.objPos.x,
      this.camPos.z - this.objPos.z
    )

    obj.rotation.set(0, this.targetY, 0)
  }
})

</script>

<div class="tracking-status" data-tracking-status>
  Aponte a camera para o marcador
</div>

<a-scene
  mindar-image="imageTargetSrc: ./target.mind;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  embedded
>

  <a-assets>
    <img id="char" src="./character.png" />
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  >
  </a-camera>

  <a-entity mindar-image-target="targetIndex: 0" target-state>

    <a-entity position="0 0.58 0.03" billboard-y>
      <a-plane
        position="0 0 0"
        width="0.74"
        height="1.05"
        material="
          shader: flat;
          src: #char;
          transparent: true;
          alphaTest: 0.01;
          depthWrite: false;
          side: double;
        ">
      </a-plane>
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
