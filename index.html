<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WebXR AR Character</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #unsupported {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: #10131a;
      text-align: center;
    }

    #unsupported.visible {
      display: grid;
    }
  </style>
</head>

<body>
  <div id="status">Toque em Enter AR e aponte para o chao.</div>
  <div id="unsupported">
    WebXR AR nao esta disponivel neste navegador. Use Chrome no Android com ARCore, em localhost ou HTTPS.
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { ARButton } from 'three/addons/webxr/ARButton.js'

    const status = document.querySelector('#status')
    const unsupported = document.querySelector('#unsupported')

    let camera
    let scene
    let renderer
    let controller
    let reticle
    let hitTestSource = null
    let hitTestSourceRequested = false
    let character = null
    let characterPlaced = false

    init()

    async function init() {
      scene = new THREE.Scene()

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 30)

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      })
      renderer.setPixelRatio(window.devicePixelRatio)
      renderer.setSize(window.innerWidth, window.innerHeight)
      renderer.xr.enabled = true
      renderer.outputColorSpace = THREE.SRGBColorSpace
      document.body.appendChild(renderer.domElement)

      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.4)
      scene.add(light)

      character = await createCharacter()
      character.visible = false
      scene.add(character)

      reticle = createReticle()
      scene.add(reticle)

      controller = renderer.xr.getController(0)
      controller.addEventListener('select', placeCharacter)
      scene.add(controller)

      if (!navigator.xr) {
        unsupported.classList.add('visible')
        status.textContent = 'WebXR nao esta disponivel neste navegador.'
        return
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar')

      if (!supported) {
        unsupported.classList.add('visible')
        status.textContent = 'AR nao suportado neste dispositivo.'
        return
      }

      document.body.appendChild(ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      }))

      renderer.setAnimationLoop(render)
      window.addEventListener('resize', onWindowResize)
    }

    async function createCharacter() {
      const texture = await new THREE.TextureLoader().loadAsync('./character.png')
      texture.colorSpace = THREE.SRGBColorSpace

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        alphaTest: 0.01,
        depthWrite: false,
        side: THREE.DoubleSide
      })

      const height = 2.26
      const width = 1.6
      const geometry = new THREE.PlaneGeometry(width, height)
      const mesh = new THREE.Mesh(geometry, material)

      mesh.position.y = height / 2

      const group = new THREE.Group()
      group.add(mesh)

      return group
    }

    function createReticle() {
      const ring = new THREE.RingGeometry(0.12, 0.16, 32)
      ring.rotateX(-Math.PI / 2)

      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.85,
        side: THREE.DoubleSide
      })

      const mesh = new THREE.Mesh(ring, material)
      mesh.matrixAutoUpdate = false
      mesh.visible = false

      return mesh
    }

    function placeCharacter() {
      if (!reticle.visible || !character) return

      const position = new THREE.Vector3()
      const quaternion = new THREE.Quaternion()
      const scale = new THREE.Vector3()

      reticle.matrix.decompose(position, quaternion, scale)

      character.position.copy(position)
      character.quaternion.copy(quaternion)

      const cameraWorldPosition = new THREE.Vector3()
      camera.getWorldPosition(cameraWorldPosition)
      character.lookAt(cameraWorldPosition.x, character.position.y, cameraWorldPosition.z)

      character.visible = true
      characterPlaced = true
      status.textContent = 'Personagem fixo no mundo 3D.'
    }

    function render(timestamp, frame) {
      if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace()
        const session = renderer.xr.getSession()

        if (!hitTestSourceRequested) {
          session.requestReferenceSpace('viewer').then((viewerSpace) => {
            session.requestHitTestSource({ space: viewerSpace }).then((source) => {
              hitTestSource = source
            })
          })

          session.addEventListener('end', () => {
            hitTestSourceRequested = false
            hitTestSource = null
            reticle.visible = false
            status.textContent = 'Toque em Enter AR e aponte para o chao.'
          })

          hitTestSourceRequested = true
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource)

          if (hitTestResults.length) {
            const hit = hitTestResults[0]
            const pose = hit.getPose(referenceSpace)

            reticle.visible = true
            reticle.matrix.fromArray(pose.transform.matrix)

            if (!characterPlaced) {
              status.textContent = 'Toque na tela para colocar o personagem.'
            }
          } else {
            reticle.visible = false

            if (!characterPlaced) {
              status.textContent = 'Mova devagar e aponte para uma superficie.'
            }
          }
        }
      }

      renderer.render(scene, camera)
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    }
  </script>
</body>
</html>
