<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>8th Wall World Character</title>

  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #camerafeed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .placed #status {
      opacity: 0;
      transition: opacity 0.25s ease;
    }
  </style>
</head>

<body>
  <canvas id="camerafeed"></canvas>
  <div id="status">Permita a camera, mova o celular devagar e toque para colocar o personagem.</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three'

    window.THREE = THREE

    const status = document.querySelector('#status')
    const canvas = document.querySelector('#camerafeed')

    const characterHeight = 2.26
    const characterWidth = 1.6

    let character = null
    let reticle = null
    let floor = null
    let scene = null
    let camera = null
    let renderer = null
    const raycaster = new THREE.Raycaster()

    const characterScenePipelineModule = () => ({
      name: 'character-scene',

      onStart: async ({ canvas: xrCanvas }) => {
        const xrScene = XR8.Threejs.xrScene()

        scene = xrScene.scene
        camera = xrScene.camera
        renderer = xrScene.renderer

        renderer.outputColorSpace = THREE.SRGBColorSpace

        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.4)
        scene.add(light)

        floor = createPlacementFloor()
        scene.add(floor)

        reticle = createReticle()
        scene.add(reticle)

        character = await createCharacter()
        character.visible = false
        scene.add(character)

        xrCanvas.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false })
        xrCanvas.addEventListener('select', placeCharacter, true)

        XR8.XrController.updateCameraProjectionMatrix({
          origin: camera.position,
          facing: camera.quaternion,
        })

        status.textContent = 'Mova o celular devagar e toque no chao para colocar o personagem.'
      },

      onUpdate: () => {
        if (!camera || !reticle || !floor) return

        raycaster.setFromCamera({ x: 0, y: 0 }, camera)
        const intersects = raycaster.intersectObject(floor)

        if (intersects.length) {
          reticle.visible = true
          reticle.position.copy(intersects[0].point)
        } else {
          reticle.visible = false
        }
      },
    })

    async function createCharacter() {
      const texture = await new THREE.TextureLoader().loadAsync('./character.png')
      texture.colorSpace = THREE.SRGBColorSpace

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        alphaTest: 0.01,
        depthWrite: false,
        side: THREE.DoubleSide,
      })

      const geometry = new THREE.PlaneGeometry(characterWidth, characterHeight)
      const mesh = new THREE.Mesh(geometry, material)
      mesh.position.y = characterHeight / 2

      const group = new THREE.Group()
      group.add(mesh)

      return group
    }

    function createPlacementFloor() {
      const geometry = new THREE.PlaneGeometry(200, 200)
      geometry.rotateX(-Math.PI / 2)

      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0,
        depthWrite: false,
      })

      const mesh = new THREE.Mesh(geometry, material)
      mesh.visible = true

      return mesh
    }

    function createReticle() {
      const geometry = new THREE.RingGeometry(0.14, 0.18, 40)
      geometry.rotateX(-Math.PI / 2)

      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide,
      })

      const mesh = new THREE.Mesh(geometry, material)
      mesh.visible = false

      return mesh
    }

    function placeCharacter(event) {
      if (!character || !camera || !floor) return

      const tapPosition = event.position || { x: 0, y: 0 }
      raycaster.setFromCamera(tapPosition, camera)

      const intersects = raycaster.intersectObject(floor)

      if (!intersects.length) {
        status.textContent = 'Aponte para o chao e toque novamente.'
        console.log('No floor intersection')
        return
      }

      const point = intersects[0].point

      character.position.copy(point)
      character.lookAt(camera.position.x, character.position.y, camera.position.z)
      character.visible = true

      reticle.visible = false
      document.body.classList.add('placed')
      status.textContent = 'Personagem fixo no mundo.'
      console.log('Character placed', point)
    }

    const onxrloaded = () => {
      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        LandingPage.pipelineModule(),
        XRExtras.FullWindowCanvas.pipelineModule(),
        XRExtras.Loading.pipelineModule(),
        XRExtras.RuntimeError.pipelineModule(),
        characterScenePipelineModule(),
      ])

      XR8.run({
        canvas,
        allowedDevices: XR8.XrConfig.device().ANY,
      })
    }

    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)
  </script>
</body>
</html>
