<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>AR Photo Frame</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      width: 100%;
      height: 100%;
    }

    .tracking-status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>

<body>

<script>
AFRAME.registerComponent('target-state', {
  init: function () {
    const status = document.querySelector('[data-tracking-status]')

    this.el.addEventListener('targetFound', () => {
      if (status) status.textContent = 'Alvo detectado'
    })

    this.el.addEventListener('targetLost', () => {
      if (status) status.textContent = 'Aponte a camera para o marcador'
    })
  }
})

AFRAME.registerComponent('billboard-y', {
  init: function () {
    this.target = new THREE.Object3D()
    this.targetRotation = new THREE.Quaternion()
    this.camPos = new THREE.Vector3()
    this.objPos = new THREE.Vector3()
  },

  tick: function () {

    const camera = document.querySelector('[camera]')

    if (!camera) return

    camera.object3D.getWorldPosition(this.camPos)

    const obj = this.el.object3D
    obj.getWorldPosition(this.objPos)

    this.target.position.copy(this.objPos)
    this.target.lookAt(
      this.camPos.x,
      this.objPos.y,
      this.camPos.z
    )

    this.targetRotation.copy(this.target.quaternion)
    obj.quaternion.slerp(this.targetRotation, 0.1)
  }
})
</script>

<div class="tracking-status" data-tracking-status>
  Aponte a camera para o marcador
</div>

<a-scene
  mindar-image="imageTargetSrc: ./target.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  embedded
>

  <a-assets>
    <img id="char" src="./character.png" />
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  >
  </a-camera>

  <a-entity mindar-image-target="targetIndex: 0" target-state>

    <a-entity position="0 0.58 0.03" billboard-y>
      <a-plane
        position="0 0 0.02"
        width="0.74"
        height="1.05"
        material="
          shader: flat;
          src: #char;
          transparent: true;
          alphaTest: 0.01;
          depthWrite: false;
          side: double;
        ">
      </a-plane>

      <a-plane position="0 0.55 0.01" width="0.84" height="0.035" color="#f4f0e8" material="shader: flat; side: double;"></a-plane>
      <a-plane position="0 -0.55 0.01" width="0.84" height="0.035" color="#f4f0e8" material="shader: flat; side: double;"></a-plane>
      <a-plane position="-0.43 0 0.01" width="0.035" height="1.1" color="#f4f0e8" material="shader: flat; side: double;"></a-plane>
      <a-plane position="0.43 0 0.01" width="0.035" height="1.1" color="#f4f0e8" material="shader: flat; side: double;"></a-plane>
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
