<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>8th Wall ワールドキャラクター</title>

  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #camerafeed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .placed #status {
      opacity: 0;
      transition: opacity 0.25s ease;
    }
  </style>
</head>

<body>
  <canvas id="camerafeed"></canvas>
  <div id="status">カメラを許可し、端末をゆっくり動かして、画面をタップしてください。</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three'

    window.THREE = THREE

    const status = document.querySelector('#status')
    const canvas = document.querySelector('#camerafeed')

    const characterHeight = 3.0
    const characterWidth = 2.12

    let character = null
    let reticle = null
    let floor = null
    let scene = null
    let camera = null
    let renderer = null
    const raycaster = new THREE.Raycaster()
    const cameraWorldPosition = new THREE.Vector3()
    const characterWorldPosition = new THREE.Vector3()

    const characterScenePipelineModule = () => ({
      name: 'character-scene',

      onStart: async ({ canvas: xrCanvas }) => {
        const xrScene = XR8.Threejs.xrScene()

        scene = xrScene.scene
        camera = xrScene.camera
        renderer = xrScene.renderer

        renderer.outputColorSpace = THREE.SRGBColorSpace

        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2.4)
        scene.add(light)

        floor = createPlacementFloor()
        scene.add(floor)

        reticle = createReticle()
        scene.add(reticle)

        character = await createCharacter()
        character.visible = false
        scene.add(character)

        xrCanvas.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false })
        xrCanvas.addEventListener('select', placeCharacterFromSelect, true)
        xrCanvas.addEventListener('touchend', placeCharacterFromTouch, { passive: false })
        xrCanvas.addEventListener('click', placeCharacterFromClick, true)

        XR8.XrController.updateCameraProjectionMatrix({
          origin: camera.position,
          facing: camera.quaternion,
        })

        status.textContent = '端末をゆっくり動かして、床に向けてタップしてください。'
      },

      onUpdate: () => {
        if (!camera || !reticle || !floor) return

        updateCharacterBillboard()

        raycaster.setFromCamera({ x: 0, y: 0 }, camera)
        const intersects = raycaster.intersectObject(floor)

        if (intersects.length) {
          reticle.visible = true
          reticle.position.copy(intersects[0].point)
        } else {
          reticle.visible = false
        }
      },
    })

    async function createCharacter() {
      const texture = await new THREE.TextureLoader().loadAsync('./character.png')
      texture.colorSpace = THREE.SRGBColorSpace

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        alphaTest: 0.01,
        depthWrite: false,
        side: THREE.DoubleSide,
      })

      const geometry = new THREE.PlaneGeometry(characterWidth, characterHeight)
      const mesh = new THREE.Mesh(geometry, material)
      mesh.position.y = characterHeight / 2

      const group = new THREE.Group()
      group.add(mesh)

      return group
    }

    function createPlacementFloor() {
      const geometry = new THREE.PlaneGeometry(200, 200)
      geometry.rotateX(-Math.PI / 2)

      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0,
        depthWrite: false,
      })

      const mesh = new THREE.Mesh(geometry, material)
      mesh.visible = true

      return mesh
    }

    function createReticle() {
      const geometry = new THREE.RingGeometry(0.14, 0.18, 40)
      geometry.rotateX(-Math.PI / 2)

      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide,
      })

      const mesh = new THREE.Mesh(geometry, material)
      mesh.visible = false

      return mesh
    }

    function placeCharacterFromSelect(event) {
      if (!character || !camera || !floor) return

      const tapPosition = event.position || { x: 0, y: 0 }
      placeCharacterAtScreenPosition(tapPosition)
    }

    function placeCharacterFromTouch(event) {
      event.preventDefault()

      if (!event.changedTouches || !event.changedTouches.length) return

      const touch = event.changedTouches[0]
      placeCharacterAtClientPosition(touch.clientX, touch.clientY)
    }

    function placeCharacterFromClick(event) {
      placeCharacterAtClientPosition(event.clientX, event.clientY)
    }

    function placeCharacterAtClientPosition(clientX, clientY) {
      const rect = canvas.getBoundingClientRect()
      const tapPosition = {
        x: ((clientX - rect.left) / rect.width) * 2 - 1,
        y: -(((clientY - rect.top) / rect.height) * 2 - 1),
      }

      placeCharacterAtScreenPosition(tapPosition)
    }

    function placeCharacterAtScreenPosition(tapPosition) {
      if (!character || !camera || !floor) return

      raycaster.setFromCamera(tapPosition, camera)

      const intersects = raycaster.intersectObject(floor)

      if (!intersects.length) {
        placeCharacterInFrontOfCamera()
        status.textContent = 'キャラクターを空間に固定しました。'
        console.log('No floor intersection, placed in front of camera')
        return
      }

      const point = intersects[0].point

      character.position.copy(point)
      updateCharacterBillboard(true)
      character.visible = true

      reticle.visible = false
      document.body.classList.add('placed')
      status.textContent = 'キャラクターを空間に固定しました。'
      console.log('Character placed', point)
    }

    function placeCharacterInFrontOfCamera() {
      const direction = new THREE.Vector3()
      camera.getWorldDirection(direction)

      const point = camera.position.clone().add(direction.multiplyScalar(2))
      point.y = Math.max(0, camera.position.y - 1.2)

      character.position.copy(point)
      character.visible = true
      updateCharacterBillboard(true)

      reticle.visible = false
      document.body.classList.add('placed')
    }

    function updateCharacterBillboard(snap = false) {
      if (!character || !character.visible || !camera) return

      camera.getWorldPosition(cameraWorldPosition)
      character.getWorldPosition(characterWorldPosition)

      const targetY = Math.atan2(
        cameraWorldPosition.x - characterWorldPosition.x,
        cameraWorldPosition.z - characterWorldPosition.z
      )

      if (snap) {
        character.rotation.set(0, targetY, 0)
        return
      }

      const delta = Math.atan2(
        Math.sin(targetY - character.rotation.y),
        Math.cos(targetY - character.rotation.y)
      )

      character.rotation.y += delta * 0.12
    }

    const onxrloaded = () => {
      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        XRExtras.FullWindowCanvas.pipelineModule(),
        XRExtras.RuntimeError.pipelineModule(),
        characterScenePipelineModule(),
      ])

      XR8.run({
        canvas,
        allowedDevices: XR8.XrConfig.device().ANY,
      })
    }

    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)
  </script>
</body>
</html>
