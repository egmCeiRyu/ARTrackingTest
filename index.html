<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>AR Photo Frame</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      width: 100%;
      height: 100%;
    }

    .tracking-status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 10, 14, 0.72);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>

<body>

<script>
AFRAME.registerComponent('target-state', {
  init: function () {
    const status = document.querySelector('[data-tracking-status]')

    this.el.addEventListener('targetFound', () => {
      if (status) status.textContent = 'Alvo detectado'
    })

    this.el.addEventListener('targetLost', () => {
      if (status) status.textContent = 'Aponte a camera para o marcador'
    })
  }
})

AFRAME.registerComponent('billboard-y', {
  init: function () {
    this.camera = null
    this.camPos = new THREE.Vector3()
    this.objPos = new THREE.Vector3()
    this.target = new THREE.Object3D()
    this.targetWorldQuat = new THREE.Quaternion()
    this.parentWorldQuat = new THREE.Quaternion()
    this.targetLocalQuat = new THREE.Quaternion()
  },

  tick: function () {
    if (!this.camera) {
      this.camera = document.querySelector('[camera]')
    }

    if (!this.camera) return

    const obj = this.el.object3D

    this.camera.object3D.getWorldPosition(this.camPos)
    obj.getWorldPosition(this.objPos)

    this.target.position.copy(this.objPos)
    this.target.lookAt(
      this.camPos.x,
      this.objPos.y,
      this.camPos.z
    )
    this.targetWorldQuat.copy(this.target.quaternion)

    if (obj.parent) {
      obj.parent.getWorldQuaternion(this.parentWorldQuat).invert()
      this.targetLocalQuat.copy(this.parentWorldQuat).multiply(this.targetWorldQuat)
    } else {
      this.targetLocalQuat.copy(this.targetWorldQuat)
    }

    if (obj.quaternion.angleTo(this.targetLocalQuat) < 0.01) return

    obj.quaternion.slerp(this.targetLocalQuat, 0.06)
  }
})

</script>

<div class="tracking-status" data-tracking-status>
  Aponte a camera para o marcador
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./target.mind;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
    warmupTolerance: 5;
    missTolerance: 5;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  embedded
>

  <a-assets>
    <img id="char" src="./character.png" />
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  >
  </a-camera>

  <a-entity mindar-image-target="targetIndex: 0" target-state>

    <a-entity position="0 0.58 0.03" billboard-y>
      <a-image
        position="0 0 0"
        width="0.74"
        height="1.05"
        src="#char"
        material="shader: flat; transparent: true; alphaTest: 0.001; depthWrite: false; side: double;">
      </a-image>
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
